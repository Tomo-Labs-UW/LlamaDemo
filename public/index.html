<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TomoTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Tomo Tube home">
        <span class="brand-name">TomoTube</span>
      </a>

      <section id="profile-button"></section>
    </header>
    <main class="container">
      <!-- PDF Upload Section -->
      <section class="card" id="upload-section">
        <div class="window-titlebar">
          <span class="window-title">TomoTube</span>
          <span class="window-icon" aria-hidden="true"></span>
        </div>

        <div class="upload-stage">
          <div class="upload-card">
            <h1>Upload a Reading</h1>
            <div class="upload-tabs" role="tablist" aria-label="Upload options">
              <label for="pdf-input" class="btn upload-tab active" role="tab" aria-selected="true">File</label>
              <button class="btn upload-tab" type="button" disabled aria-disabled="true">Text</button>
            </div>

            <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="PDF upload area">
              <p id="drop-zone-primary">Drag and drop a PDF here</p>
              <p id="drop-zone-secondary">or click File to choose one</p>
              <input id="pdf-input" type="file" accept="application/pdf" />
            </div>
            <div class="actions upload-continue">
              <button id="continue-btn" class="btn" type="button" disabled>Continue</button>
            </div>
            <p id="status" class="status" aria-live="polite"></p>
          </div>
        </div>
      </section>

      <!-- Simplified Reading Results -->
      <section class="card hidden" id="results-section">
        <h1>TomoTube</h1>
        <div id="metadata-panel" class="metadata-panel hidden">
          <div class="metadata-card">
            <h2>Reading Details</h2>
            <div class="metadata-fields">
              <label for="title-input">Title</label>
              <input id="title-input" type="text" placeholder="Enter title" />
              <label for="author-input">Author</label>
              <input id="author-input" type="text" placeholder="Enter author" />
            </div>
            <div class="actions">
              <button id="metadata-continue-btn" class="btn" type="button">Continue</button>
            </div>
          </div>
        </div>
        <div id="length-panel" class="length-panel">
          <div class="length-card">
            <h2>Translation Features</h2>
            <div class="output-length-row">
              <span class="length-label">Length</span>
              <div class="length-options" role="group" aria-label="Output length">
                <button class="btn length-option" type="button" data-length="short" aria-pressed="false">Short</button>
                <button class="btn length-option active" type="button" data-length="medium" aria-pressed="true">Medium</button>
                <button class="btn length-option" type="button" data-length="long" aria-pressed="false">Long</button>
              </div>
            </div>
            <div class="actions">
              <button id="translate-btn" class="btn" type="button">Translate</button>
            </div>
          </div>
        </div>
        <div id="source-box" class="source-box"></div>
        <div id="status-panel" class="status-panel">Loading panel: shown while Tomo simplifies the reading.</div>
        <div id="output-wrap" class="output-wrap hidden">
          <div id="output" class="output">Output panel: the simplified reading appears here.</div>
          <div id="output-actions" class="output-actions hidden">
            <button id="regenerate-btn" class="btn" type="button">Regenerate</button>
            <a id="upload-again-btn" class="btn upload-again-btn" href="index.html">Upload another PDF</a>
          </div>
        </div>
        <div class="actions tts-launch">
          <button id="tts-btn" class="btn hidden" type="button">Listen to Text</button>
        </div>
        <div id="tts-controls" class="tts-controls hidden">
          <button id="play-pause-btn" class="btn" type="button">Pause</button>
          <button id="stop-btn" class="btn" type="button">Stop</button>
          <label for="speed-slider">Speed</label>
          <input id="speed-slider" type="range" min="0.5" max="2" step="0.1" value="1" />
          <span id="speed-value">1.0x</span>
        </div>
        <footer id="meta-footer" class="meta-footer hidden" aria-live="polite">
          <div class="meta-context-row">
            <p class="meta-context-text">
              <span id="meta-footer-title" class="meta-title"></span>
              <span id="meta-footer-author-wrap" class="meta-author-wrap hidden">
                <span class="meta-by">by</span>
                <span id="meta-footer-author" class="meta-author"></span>
              </span>
            </p>
          </div>
        </footer>
      </section>
    </main>

    <script type="module" src="javascripts/index.js"></script>
  </body>
</html>
