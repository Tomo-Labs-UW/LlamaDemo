<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TomoTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Tomo Tube home">
        <span class="brand-name">TomoTube</span>
      </a>

      <section id="profile-button"></section>
    </header>
    <main class="container">
      <!-- PDF Upload Section -->
      <section class="card" id="upload-section">
        <div class="window-titlebar">
          <span class="window-title">TomoTube</span>
          <span class="window-icon" aria-hidden="true"></span>
        </div>

        <div class="upload-stage">
          <div class="upload-card">
            <h1>Upload a Reading</h1>
            <div class="upload-tabs" role="tablist" aria-label="Upload options">
              <label for="pdf-input" class="btn upload-tab active" role="tab" aria-selected="true">File</label>
              <button class="btn upload-tab" type="button" disabled aria-disabled="true">Text</button>
            </div>

            <div id="drop-zone" class="drop-zone" tabindex="0" role="button" aria-label="PDF upload area">
              <p id="drop-zone-primary">Drag and drop a PDF here</p>
              <p id="drop-zone-secondary">or click File to choose one</p>
              <input id="pdf-input" type="file" accept="application/pdf" />
            </div>
            <div class="actions upload-continue">
              <button id="continue-btn" class="btn" type="button" disabled>Continue</button>
            </div>
            <p id="status" class="status" aria-live="polite"></p>
          </div>
        </div>
      </section>

      <!-- Simplified Reading Results -->
      <section class="card hidden" id="results-section">
        <h1>TomoTube</h1>
        <div id="metadata-panel" class="metadata-panel hidden">
          <div class="metadata-card">
            <h2>Reading Details</h2>
            <div class="metadata-fields">
              <label for="title-input">Title</label>
              <input id="title-input" type="text" placeholder="Enter title" />
              <label for="author-input">Author</label>
              <input id="author-input" type="text" placeholder="Enter author" />
            </div>
            <div class="actions">
              <button id="metadata-continue-btn" class="btn" type="button">Continue</button>
            </div>
          </div>
        </div>
        <div id="length-panel" class="length-panel">
          <div class="length-card">
            <h2>Translation Features</h2>
            <div class="output-length-row">
              <span class="length-label">Length</span>
              <div class="length-options" role="group" aria-label="Output length">
                <button class="btn length-option" type="button" data-length="short" aria-pressed="false">Short</button>
                <button class="btn length-option active" type="button" data-length="medium" aria-pressed="true">Medium</button>
                <button class="btn length-option" type="button" data-length="long" aria-pressed="false">Long</button>
              </div>
            </div>
            <div class="actions">
              <button id="translate-btn" class="btn" type="button">Translate</button>
            </div>
          </div>
        </div>
        <div id="source-box" class="source-box"></div>
        <div id="status-panel" class="status-panel">Loading panel: shown while Tomo simplifies the reading.</div>
        <div id="output-wrap" class="output-wrap hidden">
          <div id="output" class="output">Output panel: the simplified reading appears here.</div>
          <div id="output-actions" class="output-actions hidden">
            <button id="regenerate-btn" class="btn" type="button">Regenerate</button>
            <a id="upload-again-btn" class="btn upload-again-btn" href="index.html">Upload another PDF</a>
          </div>
        </div>
        <footer id="meta-footer" class="meta-footer hidden" aria-live="polite">
          <div class="meta-context-row">
            <p class="meta-context-text">
              <span id="meta-footer-title" class="meta-title"></span>
              <span id="meta-footer-author-wrap" class="meta-author-wrap">
                <span class="meta-by">by</span>
                <span id="meta-footer-author" class="meta-author"></span>
              </span>
            </p>
            <div class="footer-player-center">
              <div class="footer-player-controls" role="group" aria-label="Audio playback controls">
                <button id="rewind-btn" class="footer-control-btn" type="button" aria-label="Rewind 10 seconds">
                  <svg class="transport-icon rewind-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="19" viewBox="0 0 17 19" fill="none" aria-hidden="true">
                    <path d="M1.25 16.25V2.25M15.25 17.25L5.25 9.25L15.25 1.25V17.25Z" stroke="#1E1E1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button id="play-toggle-btn" class="footer-control-btn footer-play-btn" type="button" aria-label="Play or pause audio">
                  <svg class="transport-icon play-icon" xmlns="http://www.w3.org/2000/svg" width="22" height="27" viewBox="0 0 22 27" fill="none" aria-hidden="true">
                    <path d="M1.5 1.5L20.1667 13.5L1.5 25.5V1.5Z" stroke="#1E1E1E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button id="forward-btn" class="footer-control-btn" type="button" aria-label="Fast forward 10 seconds">
                  <svg class="transport-icon forward-icon" xmlns="http://www.w3.org/2000/svg" width="17" height="19" viewBox="0 0 17 19" fill="none" aria-hidden="true">
                    <path d="M15.25 2.25V16.25M1.25 1.25L11.25 9.25L1.25 17.25V1.25Z" stroke="#1E1E1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <svg class="ui-divider-svg" xmlns="http://www.w3.org/2000/svg" width="2" height="36" viewBox="0 0 2 36" fill="none" aria-hidden="true">
                  <path d="M1 1L0.999999 35" stroke="black" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <label for="speed-select" class="sr-only">Playback speed</label>
                <select id="speed-select" class="footer-speed-select" aria-label="Playback speed">
                  <option value="0.5">0.5x</option>
                  <option value="1" selected>1x</option>
                  <option value="1.5">1.5x</option>
                  <option value="2">2x</option>
                </select>
              </div>
              <div class="footer-progress-wrap" aria-hidden="true">
                <input id="playback-progress" class="footer-progress" type="range" min="0" max="100" value="0" />
              </div>
            </div>
            <div class="footer-quick-actions" aria-label="Footer quick actions">
              <div class="quick-row">
                <button class="quick-icon-btn" type="button" aria-label="View mode" data-mode="book" aria-pressed="false">
                  <svg class="quick-icon-svg" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">

                  </svg>
                  <svg class="mode-dot" xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true">
                    <circle cx="4" cy="4" r="4" fill="#1E1E1E"/>
                  </svg>
                </button>
                <button class="quick-icon-btn mode-active" type="button" aria-label="Preview" data-mode="play" aria-pressed="true">
                  <svg class="quick-icon-svg" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
                    <path d="M20 36.6673C29.2048 36.6673 36.6667 29.2054 36.6667 20.0007C36.6667 10.7959 29.2048 3.33398 20 3.33398C10.7953 3.33398 3.33334 10.7959 3.33334 20.0007C3.33334 29.2054 10.7953 36.6673 20 36.6673Z" stroke="#1E1E1E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

                  </svg>
                  <svg class="mode-dot" xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true">
                    <circle cx="4" cy="4" r="4" fill="#1E1E1E"/>
                  </svg>
                </button>
                <button class="quick-icon-btn" type="button" aria-label="Audio" data-mode="listen" aria-pressed="false">

                  <svg class="mode-dot" xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 8 8" fill="none" aria-hidden="true">
                    <circle cx="4" cy="4" r="4" fill="#1E1E1E"/>
                  </svg>
                </button>
                <svg class="ui-divider-svg" xmlns="http://www.w3.org/2000/svg" width="2" height="36" viewBox="0 0 2 36" fill="none" aria-hidden="true">

      </section>
    </main>

</html>
